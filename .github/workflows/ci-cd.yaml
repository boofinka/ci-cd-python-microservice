name: CI/CD Pipeline

on:
  push:
    branches: ["main"]
  pull_request:

permissions:
  contents: read
  packages: write

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r app/requirements.txt

      - name: Run tests
        run: |
          export PYTHONPATH="${PYTHONPATH}:$(pwd)"
          pytest app/tests

  build-and-push:
    needs: test
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set image name
        run: echo "IMAGE=ghcr.io/${{ github.repository_owner }}/${{ github.event.repository.name }}:${{ github.sha }}" >> "$GITHUB_ENV"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Docker image
        run: docker build -t "$IMAGE" .

      - name: Push image
        run: docker push "$IMAGE"

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Oracle VM over SSH
        uses: appleboy/ssh-action@v1.2.0
        env:
          IMAGE: ghcr.io/${{ github.repository_owner }}/${{ github.event.repository.name }}:${{ github.sha }}
          GHCR_USERNAME: ${{ github.actor }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DOMAIN_NAME: ${{ secrets.ORACLE_VM_DOMAIN }}
          TLS_EMAIL: ${{ secrets.ORACLE_VM_TLS_EMAIL }}
        with:
          host: ${{ secrets.ORACLE_VM_HOST }}
          username: ${{ secrets.ORACLE_VM_USER }}
          key: ${{ secrets.ORACLE_VM_SSH_KEY }}
          port: 22
          envs: IMAGE,GHCR_USERNAME,GHCR_TOKEN,DOMAIN_NAME,TLS_EMAIL
          script: |
            set -e
            sudo apt update
            sudo apt install -y docker.io
            sudo systemctl enable docker
            sudo systemctl start docker
            sudo usermod -aG docker "$USER" || true
            if command -v ufw >/dev/null 2>&1; then
              sudo ufw allow 22/tcp || true
              sudo ufw allow 80/tcp || true
              sudo ufw --force enable || true
            fi
            mkdir -p ~/app
            cd ~/app
            curl -fsSL https://raw.githubusercontent.com/${{ github.repository }}/main/scripts/deploy-on-vm.sh -o deploy-on-vm.sh
            chmod +x deploy-on-vm.sh
            ./deploy-on-vm.sh "$IMAGE"
            if [ -n "$DOMAIN_NAME" ]; then
              curl -fsSL https://raw.githubusercontent.com/${{ github.repository }}/main/scripts/setup-caddy.sh -o setup-caddy.sh
              chmod +x setup-caddy.sh
              ./setup-caddy.sh "$DOMAIN_NAME" "$TLS_EMAIL"
              echo "Checking HTTPS health endpoint..."
              curl -fsS "https://$DOMAIN_NAME/health"
            fi
